<h1>2026-0603-13:41</h1>
<input type="text" id="searchInput" placeholder="輸入公司名稱或統一編號…" autocomplete="off" />
<button class="search-btn" onclick="doSearch()">SEARCH</button>

<div id="resultList">載入中...</div>

<script>
const PROXY = 'https://taiwan-api-proxy.kuofong-engineer.workers.dev';
const API_BY_NAME = `${PROXY}/od/data/api/6BBA2268-1367-4B42-9CCA-BC17499EBE8C`;
const API_BY_ID   = `${PROXY}/od/data/api/5F64D864-61CB-4D0D-8AD9-492047CC1EA6`;

const HOT_COMPANIES = [
    '22099131', // 台積電
    '04356494', // 鴻海
    '23678228', // 聯發科
    '11162835', // 統一企業
    '97176270', // 台灣大哥大
    '96979609', // 中華電信
    '02674916', // 富邦金控
    '53616526', // 國泰金控
    '11700741', // 台塑
    '11558247', // 遠東集團
];

function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;

    const isId = /^\d{8}$/.test(q);
    if (isId) {
        loadResults(`${API_BY_ID}?$format=json&$filter=Business_Accounting_NO eq ${q}&$top=25`);
    } else {
        loadResults(`${API_BY_NAME}?$format=json&$filter=Company_Name like ${encodeURIComponent(q)} and Company_Status eq 01&$top=25`);
    }
}

// Enter 鍵觸發搜尋
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
});

async function loadResults(url) {
    const list = document.getElementById('resultList');
    list.textContent = '載入中...';

    try {
        const res = await fetch(url);
        const data = await res.json();
        renderList(data);
    } catch(e) {
        list.textContent = '載入失敗';
    }
}

function renderList(data) {
    const list = document.getElementById('resultList');
    list.innerHTML = '';

    if (!data || data.length === 0) {
        list.textContent = '查無資料';
        return;
    }

    data.forEach(c => {
        const div = document.createElement('div');
        div.innerHTML = `
            <a href="company.html?id=${c.Business_Accounting_NO}">${c.Company_Name}</a>
            ｜ ${c.Business_Accounting_NO}
            ｜ ${c.Company_Location || '—'}
        `;
        list.appendChild(div);
    });
}


async function loadHotCompanies() {
    const shuffled = HOT_COMPANIES.sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 5);

    const list = document.getElementById('resultList');
    list.textContent = '載入中...';
    list.innerHTML = '';

    const results = await Promise.all(
        selected.map(id =>
            fetch(`${API_BY_ID}?$format=json&$filter=Business_Accounting_NO eq ${id}&$top=1`)
            .then(r => r.json())
            .then(data => data[0])
            .catch(() => null)
        )
    );

    const valid = results.filter(Boolean);
    if (valid.length === 0) {
        list.textContent = '載入失敗';
        return;
    }

    renderList(valid);
}
